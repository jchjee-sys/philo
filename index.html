<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange PRO+</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="app">

<h1>💱 환율앱 PRO+</h1>

<div class="row">
<input id="amount" type="number" placeholder="금액 입력">
</div>

<div class="row">
<select id="from"></select>
<button id="swap">⇅</button>
<select id="to"></select>
</div>

<div class="row">
<input id="search" placeholder="통화 검색 (USD, KRW, JPY...)">
</div>

<div class="row">
<button id="convert">환율 계산</button>
<button id="refresh">환율 새로고침</button>
</div>

<div id="result"></div>
<div id="change"></div>

<canvas id="chart"></canvas>

<div class="panel">
<h3>⭐ 즐겨찾기</h3>
<ul id="favorites"></ul>
</div>

<div class="panel">
<h3>🕘 최근 계산</h3>
<ul id="history"></ul>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
